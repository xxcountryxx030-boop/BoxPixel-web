<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxPixelWeb</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0b0f13; /* Color de fondo oscuro */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header / Navbar superior */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .nav-left { display: flex; gap: 10px; align-items: center; }
        .logo-box { background: #1a1f26; padding: 5px 12px; border-radius: 6px; font-weight: bold; border: 1px solid #333; }
        .version { font-size: 0.7rem; color: #888; background: #222; padding: 2px 6px; border-radius: 4px; }
        
        .social-icons { display: flex; gap: 10px; }
        .icon { width: 30px; height: 30px; background: #1a1f26; border-radius: 6px; display: flex; align-items: center; justify-content: center; }

        /* Contenido Principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .tagline { color: #3b82f6; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        h1 { font-size: 4rem; margin: 0; font-weight: 800; }
        .description { color: #888; max-width: 500px; margin-top: 10px; }

        /* Footer */
        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="logo-box">≡ BoxPixelWeb</div>
            <span class="version">vBeta 0.9.1</span>
            <div class="social-icons">
                <div class="icon">D</div> <div class="icon">Y</div> </div>
        </div>
        <div class="logo-box">C Country</div>
    </header>

    <main>
        <div class="tagline">CREATIVITY & CRAFT</div>
        <h1>BoxPixelWeb</h1>
        <p class="description">
            A curated showcase of visuals and tools, bringing together abstract art and software. 
            Currently featuring 0 public projects.
        </p>
    </main>

    <footer>
        &copy; 2026 BoxPixelWeb - All rights reserved.
    </footer>

</body>
</html>
