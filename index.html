# BoxPixelsWeb — UI Upgrade 🚀

## Reemplazá TODO tu `<style>` por este:

```css
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#030712;
    color:white;
    overflow-x:hidden;
}

/* FONDO */

.background{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,#2563eb 0%,#030712 60%);

    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

    background-size:35px 35px;

    z-index:-2;
}

.glow{
    position:fixed;

    width:500px;
    height:500px;

    background:#2563eb;

    filter:blur(160px);

    opacity:0.2;

    top:-120px;
    right:-120px;

    z-index:-1;
}

/* NAVBAR */

nav{
    width:100%;

    padding:18px 30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.35);

    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(59,130,246,0.2);

    position:sticky;
    top:0;

    z-index:1000;
}

.logo{
    font-size:30px;
    font-weight:bold;

    color:#60a5fa;

    text-shadow:0 0 20px #2563eb;
}

.menu-btn{
    font-size:34px;
    cursor:pointer;

    transition:0.3s;
}

.menu-btn:hover{
    transform:scale(1.1);
    color:#60a5fa;
}

/* MENU */

.side-menu{

    position:fixed;

    top:0;
    right:-340px;

    width:320px;
    height:100vh;

    background:rgba(15,23,42,0.95);

    backdrop-filter:blur(18px);

    border-left:1px solid rgba(59,130,246,0.3);

    padding:30px;

    transition:0.4s;

    z-index:9999;

    display:flex;
    flex-direction:column;
    gap:20px;

    box-shadow:-10px 0 40px rgba(0,0,0,0.5);
}

.side-menu.active{
    right:0;
}

.close-btn{
    font-size:30px;
    cursor:pointer;

    align-self:flex-end;

    transition:0.3s;
}

.close-btn:hover{
    color:#60a5fa;
}

.side-menu h2{
    color:#60a5fa;
    margin-bottom:10px;
}

.side-menu a{

    color:white;

    text-decoration:none;

    background:rgba(255,255,255,0.05);

    padding:16px;

    border-radius:16px;

    transition:0.3s;

    border:1px solid rgba(255,255,255,0.06);

}

.side-menu a:hover{
    background:#2563eb;
    transform:translateX(-5px);
}

/* HERO */

.hero{
    min-height:92vh;

    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;
}

.hero h1{
    font-size:95px;

    color:#60a5fa;

    text-shadow:
    0 0 20px #2563eb,
    0 0 50px #2563eb;
}

.hero p{
    margin-top:20px;

    max-width:700px;

    color:#cbd5e1;

    font-size:19px;

    line-height:1.7;
}

.hero-card{

    margin-top:40px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(59,130,246,0.2);

    padding:30px;

    border-radius:28px;

    backdrop-filter:blur(14px);

    box-shadow:0 0 40px rgba(37,99,235,0.15);

}

/* BOTONES */

.buttons{
    margin-top:35px;

    display:flex;
    gap:20px;
    flex-wrap:wrap;

    justify-content:center;
}

.btn{

    padding:15px 34px;

    border:none;
    border-radius:18px;

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    color:white;

    cursor:pointer;

    font-size:16px;

    transition:0.3s;

    box-shadow:0 0 25px rgba(37,99,235,0.4);

}

.btn:hover{
    transform:translateY(-4px) scale(1.03);

    box-shadow:0 0 35px rgba(37,99,235,0.6);
}

/* COMUNIDAD */

.section{
    padding:90px 20px;
}

.section-title{
    text-align:center;

    font-size:48px;

    margin-bottom:50px;

    color:#60a5fa;

    text-shadow:0 0 20px #2563eb;
}

.chat-box{

    max-width:900px;

    margin:auto;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(59,130,246,0.25);

    border-radius:28px;

    padding:25px;

    backdrop-filter:blur(14px);

    box-shadow:0 0 40px rgba(0,0,0,0.3);
}

.messages{
    height:420px;

    overflow-y:auto;

    margin-bottom:20px;

    padding-right:10px;
}

.messages::-webkit-scrollbar{
    width:8px;
}

.messages::-webkit-scrollbar-thumb{
    background:#2563eb;
    border-radius:20px;
}

.message{

    background:rgba(17,24,39,0.9);

    padding:14px;

    border-radius:18px;

    margin-bottom:14px;

    border:1px solid rgba(255,255,255,0.05);

    animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

.chat-input{
    display:flex;
    gap:12px;
}

.chat-input input{

    flex:1;

    padding:16px;

    border:none;

    border-radius:16px;

    background:#0f172a;

    color:white;

    outline:none;

    font-size:15px;

    border:1px solid rgba(255,255,255,0.08);

}

.status{
    margin-top:18px;

    text-align:center;

    color:#60a5fa;
}

/* FOOTER */

footer{
    text-align:center;

    padding:40px;

    color:#94a3b8;

    border-top:1px solid rgba(255,255,255,0.05);
}

/* RESPONSIVE */

@media(max-width:700px){

    .hero h1{
        font-size:55px;
    }

    .section-title{
        font-size:36px;
    }

    .chat-input{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

}
```
