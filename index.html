<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxPixelsWeb</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050816;
    --blue:#2563eb;
    --blue2:#60a5fa;
    --text:#ffffff;
    --muted:#94a3b8;
    --border:rgba(96,165,250,0.2);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
    font-family:'Inter',sans-serif;
}

/* FONDO */

.background{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,#2563eb 0%,#050816 60%);

    z-index:-3;
}

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-2;
}

.glow{
    position:fixed;

    width:500px;
    height:500px;

    background:rgba(37,99,235,0.2);

    filter:blur(120px);

    border-radius:50%;

    top:-120px;
    right:-120px;

    z-index:-1;
}

/* NAV */

nav{
    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 28px;

    position:sticky;
    top:0;

    z-index:999;

    background:rgba(5,8,22,0.7);

    backdrop-filter:blur(12px);

    border-bottom:1px solid var(--border);
}

.logo{
    font-family:'Orbitron',sans-serif;

    font-size:28px;

    color:#60a5fa;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.user-badge{
    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 16px;

    border-radius:14px;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    color:#94a3b8;

    font-size:14px;

    cursor:pointer;

    transition:0.3s;
}

.user-badge:hover{
    background:rgba(37,99,235,0.2);
}

.menu-btn{
    width:50px;
    height:50px;

    border-radius:14px;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:0.3s;
}

.menu-btn:hover{
    background:rgba(37,99,235,0.3);
}

/* MENU LATERAL */

.side-menu{
    position:fixed;

    top:0;
    right:-320px;

    width:300px;
    height:100vh;

    background:#0f172a;

    border-left:1px solid var(--border);

    padding:30px;

    transition:0.4s;

    z-index:9999;

    display:flex;
    flex-direction:column;
    gap:18px;
}

.side-menu.active{
    right:0;
}

.close-btn{
    align-self:flex-end;

    font-size:28px;

    cursor:pointer;
}

.side-menu h2{
    color:#60a5fa;
}

.side-menu a{
    text-decoration:none;

    color:white;

    background:rgba(255,255,255,0.04);

    padding:16px;

    border-radius:16px;

    transition:0.3s;
}

.side-menu a:hover{
    background:rgba(37,99,235,0.3);
}

/* ACCOUNT MENU */

#userMenu{
    position:fixed;

    top:80px;
    right:100px;

    background:#0f172a;

    border:1px solid var(--border);

    border-radius:18px;

    padding:10px;

    display:none;

    z-index:9999;

    min-width:220px;
}

#userMenu button{
    width:100%;

    padding:12px;

    border:none;

    border-radius:12px;

    background:#111827;

    color:white;

    cursor:pointer;

    transition:0.3s;

    margin-top:5px;
}

#userMenu button:hover{
    background:#2563eb;
}

/* HERO */

.hero{
    min-height:90vh;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

.hero-box{
    max-width:900px;

    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    backdrop-filter:blur(18px);
}

.hero h1{
    font-size:78px;

    color:#60a5fa;

    font-family:'Orbitron',sans-serif;
}

.hero p{
    margin-top:20px;

    color:#cbd5e1;

    font-size:18px;
}

.sub{
    margin-top:10px;

    color:#94a3b8;
}

.buttons{
    margin-top:35px;

    display:flex;
    justify-content:center;

    gap:18px;

    flex-wrap:wrap;
}

.btn{
    padding:15px 28px;

    border:none;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    color:white;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

/* CHAT */

.section{
    padding:90px 20px;
}

.section-title{
    text-align:center;

    font-size:48px;

    margin-bottom:45px;

    color:#60a5fa;

    font-family:'Orbitron',sans-serif;
}

.chat-box{
    max-width:950px;

    margin:auto;

    background:rgba(255,255,255,0.05);

    border-radius:28px;

    border:1px solid var(--border);

    overflow:hidden;
}

.chat-top{
    padding:20px;

    border-bottom:1px solid rgba(255,255,255,0.05);

    display:flex;
    justify-content:space-between;
}

.messages{
    height:420px;

    overflow-y:auto;

    padding:22px;

    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    background:#111827;

    padding:14px 18px;

    border-radius:18px;

    word-break:break-word;
}

.message b{
    color:#60a5fa;
}

.chat-input{
    display:flex;

    gap:12px;

    padding:20px;

    border-top:1px solid rgba(255,255,255,0.05);
}

.chat-input input{
    flex:1;

    padding:16px;

    border:none;

    border-radius:16px;

    background:#0b1120;

    color:white;

    outline:none;
}

.status{
    padding:18px;

    text-align:center;

    color:#60a5fa;
}

footer{
    padding:30px;

    text-align:center;

    color:#94a3b8;
}

@media(max-width:768px){

    .hero h1{
        font-size:48px;
    }

    .hero-box{
        padding:35px 20px;
    }

    .chat-input{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

    #userMenu{
        right:20px;
    }

}

</style>
</head>

<body>

<div class="background"></div>
<div class="grid"></div>
<div class="glow"></div>

<!-- MENU LATERAL -->

<div class="side-menu" id="sideMenu">

    <div
    class="close-btn"
    onclick="closeMenu()">
    ✕
    </div>

    <h2>BoxPixelsWeb</h2>

    <a href="#"
    onclick="goHome()">
    🏠 Home
    </a>

    <a href="#"
    onclick="openCommunity()">
    💬 Comunidad
    </a>

</div>

<!-- NAV -->

<nav>

    <div class="logo">
        BoxPixelsWeb
    </div>

    <div class="nav-right">

        <div
        class="user-badge"
        id="userBadge"
        onclick="toggleAccountMenu()">

            <img
            id="userPhoto"
            src=""
            style="
            width:28px;
            height:28px;
            border-radius:50%;
            display:none;
            object-fit:cover;
            ">

            <span id="userText">
                👤 Account
            </span>

        </div>

        <div
        class="menu-btn"
        onclick="toggleMenu()">
        ☰
        </div>

    </div>

</nav>

<!-- ACCOUNT MENU -->

<div id="userMenu">

    <div id="loginOptions">

        <button onclick="googleLogin()">
        🔵 Iniciar con Google
        </button>

    </div>

    <div
    id="loggedOptions"
    style="display:none;">

        <button onclick="logoutUser()">
        🚪 Cerrar sesión
        </button>

    </div>

</div>

<!-- HOME -->

<section
class="hero"
id="homeSection">

    <div class="hero-box">

        <h1>
            BoxPixelsWeb
        </h1>

        <p>
            Plataforma gamer futurista con Firebase y chat online.
        </p>

        <div class="sub">
            No official
        </div>

        <div class="buttons">

            <button
            class="btn"
            onclick="openCommunity()">
            💬 Comunidad
            </button>

        </div>

    </div>

</section>

<!-- COMUNIDAD -->

<section
class="section"
id="communitySection"
style="display:none;">

    <h2 class="section-title">
        Comunidad
    </h2>

    <div class="chat-box">

        <div class="chat-top">

            <div>
                💬 Chat Global
            </div>

            <div>
                ● Online
            </div>

        </div>

        <div
        class="messages"
        id="messages">
        </div>

        <div class="chat-input">

            <input
            type="text"
            id="messageInput"
            placeholder="Escribe un mensaje..."
            >

            <button
            class="btn"
            onclick="sendMessage()">
            Enviar
            </button>

        </div>

        <div
        class="status"
        id="status">
        🔒 Debes iniciar sesión
        </div>

    </div>

</section>

<footer>
BoxPixelsWeb © 2026
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "TU_API_KEY",

  authDomain: "boxpixelsweb.firebaseapp.com",

  projectId: "boxpixelsweb",

  storageBucket: "boxpixelsweb.firebasestorage.app",

  messagingSenderId: "631950010482",

  appId: "1:631950010482:web:0f260882a0d02cfd733aeb",

  measurementId: "G-Y23KR36KLV"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

const provider =
new GoogleAuthProvider();

/* VARIABLES */

let currentUser = null;

const messagesDiv =
document.getElementById("messages");

const statusDiv =
document.getElementById("status");

const userText =
document.getElementById("userText");

const userPhoto =
document.getElementById("userPhoto");

const userMenu =
document.getElementById("userMenu");

const userBadge =
document.getElementById("userBadge");

const loginOptions =
document.getElementById("loginOptions");

const loggedOptions =
document.getElementById("loggedOptions");

/* MENU */

window.toggleMenu = function(){

    document
    .getElementById("sideMenu")
    .classList.toggle("active");

}

window.closeMenu = function(){

    document
    .getElementById("sideMenu")
    .classList.remove("active");

}

/* ACCOUNT MENU */

window.toggleAccountMenu = function(){

    if(userMenu.style.display === "block"){

        userMenu.style.display = "none";

    }else{

        userMenu.style.display = "block";

    }

}

document.addEventListener("click", e => {

    if(
        !userBadge.contains(e.target)
        &&
        !userMenu.contains(e.target)
    ){

        userMenu.style.display = "none";

    }

});

/* PAGINAS */

window.goHome = function(){

    document
    .getElementById("homeSection")
    .style.display = "flex";

    document
    .getElementById("communitySection")
    .style.display = "none";

    closeMenu();

}

window.openCommunity = function(){

    document
    .getElementById("homeSection")
    .style.display = "none";

    document
    .getElementById("communitySection")
    .style.display = "block";

    closeMenu();

}

/* LOGIN */

window.googleLogin = async function(){

    try{

        await signInWithPopup(
            auth,
            provider
        );

    }catch(error){

        console.error(error);

        alert(
        "Error iniciando sesión"
        );

    }

}

/* LOGOUT */

window.logoutUser = async function(){

    await signOut(auth);

}

/* AUTH */

onAuthStateChanged(auth, user => {

    if(user){

        currentUser = user;

        statusDiv.innerHTML =
        "🟢 " + user.email;

        userText.innerHTML =
        user.displayName;

        userPhoto.src =
        user.photoURL;

        userPhoto.style.display =
        "block";

        loginOptions.style.display =
        "none";

        loggedOptions.style.display =
        "block";

    }else{

        currentUser = null;

        statusDiv.innerHTML =
        "🔒 Debes iniciar sesión";

        userText.innerHTML =
        "👤 Account";

        userPhoto.style.display =
        "none";

        loginOptions.style.display =
        "block";

        loggedOptions.style.display =
        "none";

    }

});

/* CHAT */

function createMessage(user,text){

    const div =
    document.createElement("div");

    div.className =
    "message";

    div.innerHTML =
    `<b>${user}:</b> ${text}`;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

/* ENVIAR */

window.sendMessage = async function(){

    if(!currentUser){

        alert(
        "Debes iniciar sesión"
        );

        return;

    }

    const input =
    document.getElementById(
        "messageInput"
    );

    const text =
    input.value.trim();

    if(text === "") return;

    await addDoc(
        collection(db,"messages"),
        {

            username:
            currentUser.displayName
            || currentUser.email,

            text:text,

            createdAt:Date.now()

        }
    );

    input.value = "";

}

/* ENTER */

document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            sendMessage();

        }

    }
);

/* REALTIME */

const q =
query(
    collection(db,"messages"),
    orderBy("createdAt")
);

onSnapshot(q, snapshot => {

    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {

        const data =
        doc.data();

        createMessage(
            data.username,
            data.text
        );

    });

});

</script>

</body>
</html>
