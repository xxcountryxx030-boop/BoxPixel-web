<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxPixel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#202124;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.logo{
    font-size:70px;
    font-weight:bold;
    margin-bottom:30px;
    color:white;
    letter-spacing:1px;
}

.search-container{
    width:90%;
    max-width:700px;
    position:relative;
}

.search-area{
    display:flex;
    align-items:center;
    gap:10px;
}

.search-box{
    flex:1;
    background:#303134;
    border:1px solid #5f6368;
    border-radius:30px;
    padding:15px 20px;
    color:white;
    font-size:18px;
    outline:none;
    transition:0.2s;
}

.search-box:focus{
    border-color:#4ea1ff;
    box-shadow:0 0 10px rgba(78,161,255,0.4);
}

.search-btn{
    background:#4ea1ff;
    border:none;
    color:white;
    padding:15px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:17px;
    transition:0.2s;
}

.search-btn:hover{
    transform:scale(1.05);
}

.suggestions{
    margin-top:10px;
    background:#303134;
    border-radius:20px;
    overflow:hidden;
    display:none;
    border:1px solid #5f6368;
}

.suggestion{
    padding:14px 20px;
    cursor:pointer;
    transition:0.2s;
    font-size:18px;
    border-bottom:1px solid #3c4043;
}

.suggestion:last-child{
    border-bottom:none;
}

.suggestion:hover{
    background:#3c4043;
}

.footer{
    position:absolute;
    bottom:20px;
    color:#9aa0a6;
    font-size:14px;
}
</style>
</head>

<body>

<div class="logo">
    BoxPixel
</div>

<div class="search-container">

    <div class="search-area">
        <input 
            type="text"
            id="searchInput"
            class="search-box"
            placeholder="Buscar en BoxPixel..."
            autocomplete="off"
        >

        <button class="search-btn" onclick="searchNow()">
            Buscar
        </button>
    </div>

    <div class="suggestions" id="suggestions"></div>

</div>

<div class="footer">
    BoxPixel Browser
</div>

<script>
const searchInput = document.getElementById("searchInput");
const suggestionsBox = document.getElementById("suggestions");

const fakeResults = [
    "BoxPixel community",
    "BoxPixel games",
    "BoxPixel studios",
    "minecraft",
    "python",
    "javascript",
    "weather",
    "music player",
    "pixel art",
    "video editor",
    "dark mode",
    "free assets",
    "web app",
    "chat online"
];

searchInput.addEventListener("input", function(){

    const value = this.value.toLowerCase();

    suggestionsBox.innerHTML = "";

    if(value === ""){
        suggestionsBox.style.display = "none";
        return;
    }

    const filtered = fakeResults.filter(item =>
        item.toLowerCase().includes(value)
    );

    filtered.forEach(result => {

        const div = document.createElement("div");

        div.classList.add("suggestion");
        div.textContent = result;

        div.onclick = () => {
            searchInput.value = result;
            searchNow();
        };

        suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display =
        filtered.length > 0 ? "block" : "none";
});

function searchNow(){

    const query = searchInput.value;

    if(query.trim() !== ""){
        window.location.href =
        "https://www.google.com/search?q=" +
        encodeURIComponent(query);
    }
}

searchInput.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        searchNow();
    }
});
</script>

</body>
</html>
