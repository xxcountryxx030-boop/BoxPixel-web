<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxBrowser</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1f1f1f,#2d2d2d,#3a3a3a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.bg-circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.25;
}

.c1{
    width:300px;
    height:300px;
    background:#888;
    top:-100px;
    left:-100px;
}

.c2{
    width:350px;
    height:350px;
    background:#666;
    bottom:-120px;
    right:-120px;
}

.container{
    text-align:center;
    z-index:1;
}

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-bottom:30px;
}

.logo img{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:15px;
    filter:drop-shadow(0 0 20px rgba(255,255,255,.15));
}

.logo span{
    font-size:65px;
    font-weight:800;
    color:white;
    letter-spacing:2px;
    text-shadow:0 0 20px rgba(255,255,255,.15);
}

.logo span b{
    color:#bdbdbd;
}

.search-box{
    width:700px;
    max-width:90vw;
    display:flex;
    align-items:center;
    background:#444;
    border-radius:50px;
    padding:8px;
    box-shadow:
        0 10px 30px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.08);
}

.search-box input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:18px;
    padding:15px 20px;
}

.search-box input::placeholder{
    color:#bdbdbd;
}

.search-btn{
    border:none;
    background:linear-gradient(135deg,#9e9e9e,#757575);
    color:white;
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    font-size:22px;
    transition:.3s;
}

.search-btn:hover{
    transform:scale(1.08);
}

.subtitle{
    margin-top:25px;
    color:#cfcfcf;
    font-size:15px;
}

.links{
    margin-top:40px;
}

.links a{
    color:#ddd;
    text-decoration:none;
    margin:0 12px;
    transition:.3s;
}

.links a:hover{
    color:white;
}

@media(max-width:768px){
    .logo img{
        width:100px;
        height:100px;
    }

    .logo span{
        font-size:40px;
    }
}
</style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="BoxBrowser Logo">
        <span>Box<b>Browser</b></span>
    </div>

    <form action="https://www.google.com/search" method="GET">
        <div class="search-box">
            <input
                type="text"
                name="q"
                placeholder="Buscar en BoxBrowser..."
                autocomplete="off"
            >
            <button class="search-btn" type="submit">
                🔍
            </button>
        </div>
    </form>

    <div class="subtitle">
        Tu navegador, tu búsqueda, tu estilo.
    </div>

    <div class="links">
        <a href="https://google.com">Google</a>
        <a href="https://youtube.com">YouTube</a>
        <a href="https://github.com">GitHub</a>
    </div>

</div>

</body>
</html>
