<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Totoloco</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
    margin-top: 50px;
}

h1 {
    color: #ff6600;
}

.calculadora {
    background: white;
    width: 300px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px gray;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    font-size: 18px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 18px;
    cursor: pointer;
}

#resultado {
    margin-top: 15px;
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>🧮 Calculadora Totoloco 🧮</h1>

<div class="calculadora">
    <input type="number" id="num1" placeholder="Primer número">
    <input type="number" id="num2" placeholder="Segundo número">

    <br>

    <button onclick="sumar()">+</button>
    <button onclick="restar()">-</button>
    <button onclick="multiplicar()">×</button>
    <button onclick="dividir()">÷</button>

    <div id="resultado">Resultado: 0</div>
</div>

<script>
function obtenerNumeros() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    return [a, b];
}

function sumar() {
    let [a, b] = obtenerNumeros();
    document.getElementById("resultado").innerHTML =
        "Resultado: " + (a + b);
}

function restar() {
    let [a, b] = obtenerNumeros();
    document.getElementById("resultado").innerHTML =
        "Resultado: " + (a - b);
}

function multiplicar() {
    let [a, b] = obtenerNumeros();
    document.getElementById("resultado").innerHTML =
        "Resultado: " + (a * b);
}

function dividir() {
    let [a, b] = obtenerNumeros();

    if (b === 0) {
        document.getElementById("resultado").innerHTML =
            "No se puede dividir por 0";
    } else {
        document.getElementById("resultado").innerHTML =
            "Resultado: " + (a / b);
    }
}
</script>

</body>
</html>
