<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxPixelWeb</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            /* Configuración del fondo tecnológico */
            background: linear-gradient(rgba(10, 15, 30, 0.8), rgba(10, 15, 30, 0.8)), 
                        url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }

        .pill { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 8px 16px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 4rem; margin: 10px 0; letter-spacing: -2px; text-transform: uppercase; }
        .tagline { color: #5c85d6; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; }
        .desc { color: #bbb; max-width: 600px; line-height: 1.5; }

        footer { text-align: center; padding: 20px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="pill">
            <span>≡ BoxPixelWeb</span>
            <small style="opacity: 0.5;">vBeta 0.9.1</small>
        </div>
        <div class="pill">C Country</div>
    </header>

    <main>
        <div class="tagline">CREATIVITY & CRAFT</div>
        <h1>BoxPixelWeb</h1>
        <p class="desc">
            A curated showcase of sound, visuals, and tools, bringing together abstract art, 
            and Python software. Currently featuring 12 unique projects.
        </p>
    </main>

    <footer>
        &copy; 2026 BoxPixelWeb - All rights reserved.
    </footer>

</body>
</html>
