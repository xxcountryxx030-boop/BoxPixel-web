<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Música de Dilan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f1a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.player {
    width: 350px;
    background: #1c1c2b;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align: center;
}

h1 {
    font-size: 20px;
    margin-bottom: 10px;
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #6c5ce7;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #a29bfe;
}

.song-list {
    margin-top: 15px;
    text-align: left;
}

.song {
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #333;
}

.song:hover {
    background: #2d2d44;
}
</style>
</head>

<body>

<div class="player">
    <h1>🎵 Música de Dilan</h1>

    <audio id="audio" controls style="width:100%;">
        <source src="song1.mp3" type="audio/mp3">
    </audio>

    <div>
        <button onclick="playAudio()">▶️ Play</button>
        <button onclick="pauseAudio()">⏸️ Pause</button>
        <button onclick="nextSong()">⏭️ Siguiente</button>
    </div>

    <div class="song-list">
        <div class="song" onclick="loadSong('song1.mp3')">🎶 Canción 1 - Dilan</div>
        <div class="song" onclick="loadSong('song2.mp3')">🎶 Canción 2 - Dilan</div>
        <div class="song" onclick="loadSong('song3.mp3')">🎶 Canción 3 - Dilan</div>
    </div>
</div>

<script>
let songs = ["song1.mp3", "song2.mp3", "song3.mp3"];
let current = 0;

let audio = document.getElementById("audio");

function loadSong(song) {
    audio.src = song;
    audio.play();
}

function playAudio() {
    audio.play();
}

function pauseAudio() {
    audio.pause();
}

function nextSong() {
    current = (current + 1) % songs.length;
    audio.src = songs[current];
    audio.play();
}
</script>

</body>
</html>
