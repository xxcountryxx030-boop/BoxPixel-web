<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BoxPixelWeb</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      background: #0f172a;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #111827;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    .menu button {
      background: transparent;
      border: none;
      color: #cbd5e1;
      padding: 12px;
      text-align: left;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    .menu button:hover {
      background: #1f2937;
      color: white;
      transform: translateX(5px);
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      animation: fade 0.4s ease-in;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .box {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
      background: #1f2937;
    }

    /* BOTÓN */
    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }

    @media (max-width: 700px) {
      .sidebar {
        width: 180px;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ BoxPixelWeb</div>

    <div class="menu">
      <button onclick="show('home')">🏠 Inicio</button>
      <button onclick="show('panel')">📊 Panel</button>
      <button onclick="show('comunidad')">💬 Comunidad</button>
      <button onclick="show('ajustes')">⚙️ Ajustes</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h2 id="title">🏠 Inicio</h2>
      <button class="btn" onclick="alert('Hola Dylan 👋')">Acción</button>
    </div>

    <!-- CONTENIDO -->
    <div id="content">

      <div class="card">
        <h3>Bienvenido a BoxPixelWeb 🚀</h3>
        <p>Tu dashboard moderno con menú lateral y diseño pro.</p>
      </div>

      <div class="grid">
        <div class="box">⚡ Rápido</div>
        <div class="box">🎨 Moderno</div>
        <div class="box">📱 Responsive</div>
      </div>

    </div>

  </div>

  <script>
    function show(page) {
      const title = document.getElementById("title");
      const content = document.getElementById("content");

      if (page === "home") {
        title.innerText = "🏠 Inicio";
        content.innerHTML = `
          <div class="card">
            <h3>Inicio 🚀</h3>
            <p>Bienvenido a BoxPixelWeb</p>
          </div>
        `;
      }

      if (page === "panel") {
        title.innerText = "📊 Panel";
        content.innerHTML = `
          <div class="card">
            <h3>Panel de control</h3>
            <p>Estadísticas y herramientas futuras aquí.</p>
          </div>
        `;
      }

      if (page === "comunidad") {
        title.innerText = "💬 Comunidad";
        content.innerHTML = `
          <div class="card">
            <h3>Chat (demo)</h3>
            <p>Aquí después podemos agregar chat real con Firebase o Supabase 😏</p>
          </div>
        `;
      }

      if (page === "ajustes") {
        title.innerText = "⚙️ Ajustes";
        content.innerHTML = `
          <div class="card">
            <h3>Configuración</h3>
            <p>Opciones de la web aquí.</p>
          </div>
        `;
      }
    }
  </script>

</body>
</html>
