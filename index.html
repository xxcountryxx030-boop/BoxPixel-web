<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BoxPixelWeb</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b0f16;
            /* Fondo tecnológico oscuro */
            background-image: linear-gradient(rgba(11, 15, 22, 0.85), rgba(11, 15, 22, 0.85)), 
                              url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }

        .nav-pill { background: #1a1f26; padding: 8px 15px; border-radius: 8px; border: 1px solid #333; display: flex; gap: 10px; align-items: center; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 4rem; margin: 10px 0; letter-spacing: -1px; }
        .tagline { color: #5c85d6; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
        .desc { color: #888; max-width: 500px; margin-top: 10px; }

        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-pill">
            <span>≡ BoxPixelWeb</span>
            <small style="color: #666;">vBeta 0.9.1</small>
        </div>
        <div class="nav-pill">C Country</div>
    </header>

    <main>
        <div class="tagline">CREATIVITY & CRAFT</div>
        <h1>BoxPixelWeb</h1>
        <p class="desc">A curated showcase of visuals and tools, bringing together abstract art and Python software.</p>
    </main>

    <footer>
        &copy; 2026 BoxPixelWeb - All rights reserved.
    </footer>

</body>
</html>
