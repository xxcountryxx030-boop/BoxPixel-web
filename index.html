<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BoxPixelWeb</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 25px;
    }

    .menu button {
      background: transparent;
      border: none;
      color: #cbd5e1;
      padding: 12px;
      text-align: left;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      width: 100%;
      font-size: 14px;
    }

    .menu button:hover {
      background: rgba(59,130,246,0.15);
      color: white;
      transform: translateX(5px);
    }

    .menu button.active {
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }

    /* HERO */
    .hero-title {
      font-size: 60px;
      font-weight: 800;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      margin-top: 10px;
      color: #cbd5e1;
    }

    .section {
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 15px;
      margin-bottom: 12px;
    }

    /* CHAT */
    .chat-box {
      height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 5px 0;
      font-size: 14px;
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ BoxPixelWeb</div>

    <div class="menu">
      <button class="active" onclick="setPage('home', this)">🏠 Inicio</button>
      <button onclick="setPage('panel', this)">📊 Panel</button>
      <button onclick="setPage('comunidad', this)">💬 Comunidad</button>
      <button onclick="setPage('ai', this)">🤖 BoxPixel AI</button>
      <button onclick="setPage('ajustes', this)">⚙️ Ajustes</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h2 id="title">Inicio</h2>
      <button class="btn">Acción</button>
    </div>

    <div id="content"></div>

  </div>

  <script>
    function setPage(page, btn) {

      document.querySelectorAll(".menu button")
        .forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const title = document.getElementById("title");
      const content = document.getElementById("content");

      if (page === "home") {
        title.innerText = "Inicio";
        content.innerHTML = `
          <div class="hero-title">BoxPixelWeb</div>
          <div class="hero-sub">Web moderna con chat y AI 🚀</div>

          <div class="section">
            <div class="card">⚡ Rápido</div>
            <div class="card">🎨 Moderno</div>
            <div class="card">📱 Responsive</div>
          </div>
        `;
      }

      if (page === "panel") {
        title.innerText = "Panel";
        content.innerHTML = `
          <div class="card">👥 Usuarios: 15</div>
          <div class="card">💬 Mensajes: 92</div>
          <div class="card">🟢 Estado: Online</div>
        `;
      }

      if (page === "comunidad") {
        title.innerText = "Comunidad";

        content.innerHTML = `
          <div class="card">
            <h3>💬 Chat Comunidad</h3>

            <div class="chat-box" id="chat">
              <div class="msg">👤 Sistema: Bienvenido al chat</div>
            </div>

            <div class="input-box">
              <input id="msg" placeholder="Escribe un mensaje..."/>
              <button class="btn" onclick="sendMsg()">Enviar</button>
            </div>
          </div>
        `;
      }

      if (page === "ai") {
        title.innerText = "BoxPixel AI";

        content.innerHTML = `
          <div class="card">
            <h3>🤖 BoxPixel AI</h3>
            <p>Pregúntame algo (simulado)</p>

            <div class="chat-box" id="aiChat">
              <div class="msg">🤖 AI: Hola, soy BoxPixel AI</div>
            </div>

            <div class="input-box">
              <input id="aiMsg" placeholder="Pregunta algo..."/>
              <button class="btn" onclick="aiReply()">Enviar</button>
            </div>
          </div>
        `;
      }

      if (page === "ajustes") {
        title.innerText = "Ajustes";
        content.innerHTML = `
          <div class="card">🌙 Tema: Oscuro</div>
          <div class="card">🔔 Notificaciones: ON</div>
        `;
      }
    }

    function sendMsg() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");

      if (!input.value) return;

      chat.innerHTML += `<div class="msg">🧑 Tú: ${input.value}</div>`;
      input.value = "";

      chat.scrollTop = chat.scrollHeight;
    }

    function aiReply() {
      const input = document.getElementById("aiMsg");
      const chat = document.getElementById("aiChat");

      if (!input.value) return;

      chat.innerHTML += `<div class="msg">🧑 Tú: ${input.value}</div>`;

      setTimeout(() => {
        chat.innerHTML += `<div class="msg">🤖 AI: Estoy procesando "${input.value}"...</div>`;
        chat.scrollTop = chat.scrollHeight;
      }, 600);

      input.value = "";
    }

    // iniciar en home
    document.querySelector(".menu button").click();
  </script>

</body>
</html>
