<script>

/* =========================================
   SUPABASE
========================================= */

const SUPABASE_URL =
"https://gwibpxgibmraqebetvss.supabase.co";

const SUPABASE_KEY =
"TU_SUPABASE_ANON_KEY";

const { createClient } = supabase;

const client =
createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* =========================================
   USERNAME
========================================= */

const username =
"User" +
Math.floor(Math.random() * 9999);

/* =========================================
   ELEMENTOS
========================================= */

const messagesDiv =
document.getElementById("messages");

const statusDiv =
document.getElementById("status");

/* =========================================
   MENSAJES MOSTRADOS
========================================= */

const shownMessages =
new Set();

/* =========================================
   AGREGAR MENSAJE
========================================= */

function addMessage(id, username, text){

    if(shownMessages.has(id)) return;

    shownMessages.add(id);

    const div =
    document.createElement("div");

    div.className =
    "message";

    div.innerHTML =
    `<b>${username}:</b> ${text}`;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

/* =========================================
   CARGAR MENSAJES
========================================= */

async function loadMessages(){

    statusDiv.innerHTML =
    "📥 Cargando chat...";

    const { data, error } =
    await client
    .from("messages")
    .select("*")
    .order(
        "created_at",
        { ascending:true }
    );

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ Error cargando";

        return;

    }

    messagesDiv.innerHTML = "";

    shownMessages.clear();

    data.forEach(msg => {

        addMessage(
            msg.id,
            msg.username,
            msg.text
        );

    });

    statusDiv.innerHTML =
    "🟢 Chat conectado";

}

/* =========================================
   ENVIAR MENSAJE
========================================= */

async function sendMessage(){

    const input =
    document.getElementById(
        "messageInput"
    );

    const text =
    input.value.trim();

    if(!text) return;

    statusDiv.innerHTML =
    "📤 Enviando...";

    const { data, error } =
    await client
    .from("messages")
    .insert({
        username: username,
        text: text
    })
    .select();

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ " + error.message;

        return;

    }

    if(data && data.length > 0){

        addMessage(
            data[0].id,
            data[0].username,
            data[0].text
        );

    }

    input.value = "";

    statusDiv.innerHTML =
    "🟢 Mensaje enviado";

}

/* =========================================
   ENTER
========================================= */

document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            sendMessage();

        }

    }
);

/* =========================================
   REALTIME
========================================= */

client
.channel("chat-room")

.on(
    "postgres_changes",
    {
        event:"INSERT",
        schema:"public",
        table:"messages"
    },

    payload => {

        addMessage(
            payload.new.id,
            payload.new.username,
            payload.new.text
        );

    }

)

.subscribe(status => {

    console.log(status);

    if(status === "SUBSCRIBED"){

        statusDiv.innerHTML =
        "🟢 Tiempo real conectado";

    }

});

/* =========================================
   INICIAR
========================================= */

loadMessages();

</script>
