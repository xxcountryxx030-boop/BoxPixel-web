<script>

/* =========================================
   SUPABASE
========================================= */

const SUPABASE_URL =
"https://gwibpxgibmraqebetvss.supabase.co";

const SUPABASE_KEY =
"TU_SUPABASE_ANON_KEY";

const { createClient } = supabase;

const client =
createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* =========================================
   USERNAME
========================================= */

const username =
"User" +
Math.floor(Math.random()*9999);

/* =========================================
   ELEMENTOS
========================================= */

const messagesDiv =
document.getElementById("messages");

const statusDiv =
document.getElementById("status");

/* =========================================
   CONTROL DUPLICADOS
========================================= */

const loadedMessages =
new Set();

/* =========================================
   CREAR MENSAJE
========================================= */

function createMessage(id,user,text){

    if(loadedMessages.has(id)) return;

    loadedMessages.add(id);

    const div =
    document.createElement("div");

    div.className =
    "message";

    div.innerHTML =
    `<b>${user}:</b> ${text}`;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

/* =========================================
   CARGAR MENSAJES
========================================= */

async function loadMessages(){

    statusDiv.innerHTML =
    "📥 Cargando chat...";

    const { data,error } =
    await client
    .from("messages")
    .select("*")
    .order(
        "created_at",
        { ascending:true }
    );

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ Error cargando";

        return;

    }

    messagesDiv.innerHTML = "";

    loadedMessages.clear();

    data.forEach(msg => {

        createMessage(
            msg.id,
            msg.username,
            msg.text
        );

    });

    statusDiv.innerHTML =
    "🟢 Chat conectado";

}

/* =========================================
   ENVIAR
========================================= */

async function sendMessage(){

    const input =
    document.getElementById(
        "messageInput"
    );

    const text =
    input.value.trim();

    if(text === "") return;

    statusDiv.innerHTML =
    "📤 Enviando...";

    const { data,error } =
    await client
    .from("messages")
    .insert([
        {
            username: username,
            text: text
        }
    ])
    .select();

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ " + error.message;

        return;

    }

    if(data){

        data.forEach(msg => {

            createMessage(
                msg.id,
                msg.username,
                msg.text
            );

        });

    }

    input.value = "";

    statusDiv.innerHTML =
    "🟢 Mensaje enviado";

}

/* =========================================
   ENTER
========================================= */

document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            sendMessage();

        }

    }
);

/* =========================================
   REALTIME
========================================= */

client
.channel("chat-room")

.on(
    "postgres_changes",
    {
        event:"INSERT",
        schema:"public",
        table:"messages"
    },

    payload => {

        createMessage(
            payload.new.id,
            payload.new.username,
            payload.new.text
        );

    }

)

.subscribe(status => {

    console.log(status);

    if(status === "SUBSCRIBED"){

        statusDiv.innerHTML =
        "🟢 Tiempo real conectado";

    }

});

/* =========================================
   INICIAR
========================================= */

loadMessages();

</script>
