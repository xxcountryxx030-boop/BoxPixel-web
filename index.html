<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================================
   🔥 SUPABASE CONNECTION (PEGA TUS KEYS AQUÍ)
========================================= */

const SUPABASE_URL = "https://supabase.com/dashboard/project/bwcwoigrodrdwfnbrqkt/sql/3e884502-3e38-41e6-a7b4-86723821e978";
const SUPABASE_ANON_KEY = "sb_publishable_jiybkkEkfT0pE1oKEApyzw_ZRpPLGHk";

/* 👉 CONEXIÓN A SUPABASE */
const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* =========================================
   💬 CHAT FUNCTIONS
========================================= */

async function sendMsg() {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  await supabaseClient.from("messages").insert([
    {
      username: "Dylan",
      message: input.value
    }
  ]);

  input.value = "";
  loadMessages();
}

async function loadMessages() {
  const { data } = await supabaseClient
    .from("messages")
    .select("*")
    .order("id", { ascending: true });

  const chat = document.getElementById("chat");
  if (!chat) return;

  chat.innerHTML = "";

  data.forEach(m => {
    chat.innerHTML += `
      <div class="msg">🧑 ${m.username}: ${m.message}</div>
    `;
  });

  chat.scrollTop = chat.scrollHeight;
}

/* =========================================
   ⚡ TIEMPO REAL (AUTO UPDATE)
========================================= */

supabaseClient
  .channel('messages')
  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'messages'
  }, () => {
    loadMessages();
  })
  .subscribe();

</script>
