<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxPixelsWeb</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* Fondo */

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#2563eb 0%,#050816 60%);
    z-index:-2;
}

.grid{
    position:fixed;
    width:100%;
    height:100%;

    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-1;
}

/* Navbar */

nav{
    width:100%;
    padding:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);

    border-bottom:1px solid #3b82f6;

    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    color:#60a5fa;
    text-shadow:0 0 15px #3b82f6;
}

.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.nav-links a:hover{
    color:#60a5fa;
}

/* Hero */

.hero{
    min-height:90vh;

    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:20px;
}

.hero h1{
    font-size:75px;
    color:#60a5fa;

    text-shadow:0 0 30px #2563eb;
}

.hero p{
    margin-top:20px;
    max-width:700px;
    color:#cbd5e1;
    font-size:18px;
}

/* Botones */

.buttons{
    margin-top:35px;

    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    padding:14px 30px;

    border:none;
    border-radius:14px;

    background:#2563eb;

    color:white;
    cursor:pointer;

    font-size:16px;

    transition:0.3s;

    box-shadow:0 0 15px #2563eb;
}

.btn:hover{
    transform:scale(1.05);
    background:#3b82f6;
}

/* Sections */

.section{
    padding:80px 20px;
}

.section-title{
    text-align:center;
    font-size:40px;
    margin-bottom:50px;

    color:#60a5fa;
}

/* Cards */

.cards{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;
}

.card{
    background:rgba(255,255,255,0.05);

    border:1px solid rgba(59,130,246,0.3);

    border-radius:20px;

    padding:30px;

    transition:0.3s;

    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-10px);

    box-shadow:0 0 20px #2563eb;
}

.card h3{
    margin-bottom:15px;
    color:#60a5fa;
}

/* Chat */

.chat-box{
    max-width:800px;

    margin:auto;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(59,130,246,0.3);

    border-radius:20px;

    padding:20px;

    backdrop-filter:blur(10px);
}

.messages{
    height:350px;

    overflow-y:auto;

    margin-bottom:15px;

    padding-right:10px;
}

.message{
    background:#111827;

    padding:12px;

    border-radius:12px;

    margin-bottom:10px;

    word-wrap:break-word;
}

.chat-input{
    display:flex;
    gap:10px;
}

.chat-input input{
    flex:1;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#0f172a;

    color:white;

    outline:none;
}

/* Footer */

footer{
    text-align:center;

    padding:30px;

    color:#94a3b8;

    border-top:1px solid rgba(255,255,255,0.1);

    margin-top:50px;
}

.status{
    text-align:center;
    margin-top:15px;
    color:#60a5fa;
}

</style>
</head>

<body>

<div class="background"></div>
<div class="grid"></div>

<nav>

    <div class="logo">
        BoxPixelsWeb
    </div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Comunidad</a>
        <a href="#">Noticias</a>
        <a href="#">Descargas</a>
    </div>

</nav>

<section class="hero">

    <h1>BoxPixelsWeb</h1>

    <p>
        Plataforma futurista gamer con chat global en tiempo real.
    </p>

    <div class="buttons">
        <button class="btn">Entrar</button>
        <button class="btn">Explorar</button>
    </div>

</section>

<section class="section">

    <h2 class="section-title">
        Comunidad
    </h2>

    <div class="chat-box">

        <div class="messages" id="messages"></div>

        <div class="chat-input">

            <input
            type="text"
            id="messageInput"
            placeholder="Escribe un mensaje..."
            >

            <button
            class="btn"
            onclick="sendMessage()"
            >
            Enviar
            </button>

        </div>

        <div class="status" id="status">
            Conectando...
        </div>

    </div>

</section>

<footer>
    BoxPixelsWeb © 2026 | No Official
</footer>

<script>

/* =========================================
   SUPABASE
========================================= */

const SUPABASE_URL =
"https://gwibpxgibmraqebetvss.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3aWJweGdpYm1yYXFlYmV0dnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzY1MTgsImV4cCI6MjA5MjUxOH0.OTCuIj2NpqkSw8bylyd4gajcNx7Fr7T2m8kf4xMriUA";

const { createClient } = supabase;

const client = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* =========================================
   USERNAME
========================================= */

const username =
"User" + Math.floor(Math.random() * 9999);

/* =========================================
   ELEMENTOS
========================================= */

const messagesDiv =
document.getElementById("messages");

const statusDiv =
document.getElementById("status");

/* =========================================
   AGREGAR MENSAJE
========================================= */

function addMessage(username,text){

    const div =
    document.createElement("div");

    div.className = "message";

    div.innerHTML =
    `<b>${username}:</b> ${text}`;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;
}

/* =========================================
   CARGAR MENSAJES
========================================= */

async function loadMessages(){

    const { data,error } =
    await client
    .from("messages")
    .select("*")
    .order("created_at",{ ascending:true });

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ Error cargando mensajes";

        return;
    }

    messagesDiv.innerHTML = "";

    data.forEach(msg => {

        addMessage(
            msg.username,
            msg.text
        );

    });

    statusDiv.innerHTML =
    "🟢 Chat conectado";

}

/* =========================================
   ENVIAR MENSAJE
========================================= */

async function sendMessage(){

    const input =
    document.getElementById("messageInput");

    const text =
    input.value.trim();

    if(text === "") return;

    const { error } =
    await client
    .from("messages")
    .insert({
        username: username,
        text: text
    });

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ No se pudo enviar";

        return;
    }

    input.value = "";
}

/* =========================================
   ENTER
========================================= */

document
.getElementById("messageInput")
.addEventListener("keypress",e=>{

    if(e.key === "Enter"){
        sendMessage();
    }

});

/* =========================================
   REALTIME
========================================= */

client
.channel("chat-room")

.on(
    "postgres_changes",
    {
        event:"INSERT",
        schema:"public",
        table:"messages"
    },

    payload => {

        addMessage(
            payload.new.username,
            payload.new.text
        );

    }

)

.subscribe((status) => {

    console.log(status);

    if(status === "SUBSCRIBED"){

        statusDiv.innerHTML =
        "🟢 Tiempo real conectado";

    }

});

/* =========================================
   INICIAR
========================================= */

loadMessages();

</script>

</body>
</html>
