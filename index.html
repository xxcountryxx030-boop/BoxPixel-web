<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BoxPixelWeb</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 25px;
    }

    .menu button {
      background: transparent;
      border: none;
      color: #cbd5e1;
      padding: 12px;
      text-align: left;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      width: 100%;
      font-size: 14px;
    }

    .menu button:hover {
      background: rgba(59,130,246,0.15);
      color: white;
      transform: translateX(5px);
    }

    .menu button.active {
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;   /* 🔥 ahora SÍ se puede bajar */
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    /* HOME CENTRADO */
    .hero-container {
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    .hero-title {
      font-size: 60px;
      font-weight: 800;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fade 0.5s ease;
    }

    .hero-sub {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .scroll-hint {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* SECCIONES ABAJO (para poder scrollear) */
    .section {
      margin-top: 120px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 18px;
      border-radius: 15px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.06);
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ BoxPixelWeb</div>

    <div class="menu">
      <button class="active">🏠 Inicio</button>
      <button>📊 Panel</button>
      <button>💬 Comunidad</button>
      <button>⚙️ Ajustes</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP -->
    <div class="topbar">
      <h2>Inicio</h2>
      <button class="btn">Acción</button>
    </div>

    <!-- HERO CENTRADO -->
    <div class="hero-container">
      <div>
        <div class="hero-title">BoxPixelWeb</div>
        <div class="hero-sub">Una web moderna, limpia y lista para crecer 🚀</div>
        <div class="scroll-hint">⬇ Baja para ver más</div>
      </div>
    </div>

    <!-- CONTENIDO ABAJO (para scroll) -->
    <div class="section">

      <div class="card">
        <h3>⚡ Velocidad</h3>
        <p>Interfaz rápida y optimizada</p>
      </div>

      <div class="card">
        <h3>🎨 Diseño moderno</h3>
        <p>Estilo tipo SaaS / app profesional</p>
      </div>

      <div class="card">
        <h3>📱 Responsive</h3>
        <p>Funciona en celular y PC</p>
      </div>

      <div class="card">
        <h3>🚀 Escalable</h3>
        <p>Listo para chat, login o base de datos</p>
      </div>

      <!-- 🔥 espacio extra para que se note el scroll -->
      <div style="height: 400px;"></div>

    </div>

  </div>

</body>
</html>
