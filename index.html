<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BoxPixel Search</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#fff;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .logo{
      font-size:70px;
      font-weight:bold;
      margin-bottom:30px;
      user-select:none;
    }

    .logo span:nth-child(1){ color:#4285F4; }
    .logo span:nth-child(2){ color:#EA4335; }
    .logo span:nth-child(3){ color:#FBBC05; }
    .logo span:nth-child(4){ color:#4285F4; }
    .logo span:nth-child(5){ color:#34A853; }
    .logo span:nth-child(6){ color:#EA4335; }

    .search-box{
      width:90%;
      max-width:650px;
      position:relative;
    }

    .search-box input{
      width:100%;
      padding:16px 25px;
      border-radius:50px;
      border:1px solid #dcdcdc;
      font-size:18px;
      outline:none;
      transition:0.2s;
      box-shadow:0 1px 6px rgba(32,33,36,.15);
    }

    .search-box input:focus{
      border-color:#4285F4;
      box-shadow:0 1px 10px rgba(66,133,244,.4);
    }

    .buttons{
      margin-top:30px;
      display:flex;
      gap:15px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .buttons button{
      padding:12px 22px;
      border:none;
      border-radius:6px;
      background:#f8f9fa;
      cursor:pointer;
      font-size:15px;
      transition:0.2s;
    }

    .buttons button:hover{
      background:#e8eaed;
    }

    .footer{
      position:absolute;
      bottom:20px;
      color:#777;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="logo">
    <span>B</span>
    <span>o</span>
    <span>x</span>
    <span>P</span>
    <span>i</span>
    <span>x</span>
    <span>e</span>
    <span>l</span>
    <span style="color:#555;"> Search</span>
  </div>

  <form class="search-box" onsubmit="searchGoogle(event)">
    <input 
      type="text" 
      id="searchInput"
      placeholder="Buscar en BoxPixel Search..."
    />
  </form>

  <div class="buttons">
    <button onclick="doSearch()">Buscar</button>
    <button onclick="luckySearch()">Voy a tener suerte</button>
  </div>

  <div class="footer">
    BoxPixel Search © 2026
  </div>

  <script>
    function doSearch() {
      const query = document.getElementById("searchInput").value;

      if(query.trim() !== ""){
        window.location.href =
          "https://www.google.com/search?q=" +
          encodeURIComponent(query);
      }
    }

    function luckySearch() {
      const query = document.getElementById("searchInput").value;

      if(query.trim() !== ""){
        window.location.href =
          "https://www.google.com/search?btnI=I&q=" +
          encodeURIComponent(query);
      }
    }

    function searchGoogle(event){
      event.preventDefault();
      doSearch();
    }
  </script>

</body>
</html>
