<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxPixel</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f1117;
    color:white;
}

/* ================= HOME ================= */

.home{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:
    radial-gradient(circle at top left,#2563eb33,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 30%);
}

.logo{
    font-size:85px;
    font-weight:bold;
    margin-bottom:30px;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.search-box{
    width:90%;
    max-width:700px;
    background:#1e293b;
    border-radius:50px;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    border:2px solid transparent;
    transition:0.3s;
}

.search-box:hover{
    border-color:#3b82f6;
}

.search-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:20px;
}

.search-box button{
    border:none;
    padding:12px 22px;
    border-radius:30px;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* ================= SEARCH PAGE ================= */

.results-page{
    display:none;
    min-height:100vh;
    background:#0f1117;
}

.topbar{
    display:flex;
    align-items:center;
    gap:20px;
    padding:20px;
    border-bottom:1px solid #1e293b;
}

.top-logo{
    font-size:35px;
    font-weight:bold;
    background:linear-gradient(90deg,#3b82f6,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.top-search{
    flex:1;
    display:flex;
    gap:10px;
}

.top-search input{
    flex:1;
    padding:14px 20px;
    border:none;
    border-radius:40px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
}

.top-search button{
    padding:14px 22px;
    border:none;
    border-radius:30px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.results{
    padding:40px 80px;
}

.result{
    margin-bottom:35px;
}

.result a{
    color:#60a5fa;
    font-size:22px;
    text-decoration:none;
}

.result a:hover{
    text-decoration:underline;
}

.result .link{
    color:#22c55e;
    font-size:14px;
    margin-top:4px;
}

.result p{
    margin-top:8px;
    color:#cbd5e1;
    line-height:1.5;
}

</style>
</head>
<body>

<!-- HOME -->
<div class="home" id="home">

    <div class="logo">BoxPixel</div>

    <form class="search-box" id="searchForm">

        <input 
            type="text"
            id="searchInput"
            placeholder="Buscar en BoxPixel..."
        >

        <button type="submit">
            Buscar
        </button>

    </form>

</div>

<!-- RESULTS -->
<div class="results-page" id="resultsPage">

    <div class="topbar">

        <div class="top-logo">
            BoxPixel
        </div>

        <form class="top-search" id="topSearchForm">

            <input 
                type="text"
                id="topSearchInput"
                placeholder="Buscar..."
            >

            <button type="submit">
                Buscar
            </button>

        </form>

    </div>

    <div class="results" id="results">

    </div>

</div>

<script>

const searchForm = document.getElementById("searchForm");
const topSearchForm = document.getElementById("topSearchForm");

const searchInput = document.getElementById("searchInput");
const topSearchInput = document.getElementById("topSearchInput");

const home = document.getElementById("home");
const resultsPage = document.getElementById("resultsPage");
const resultsDiv = document.getElementById("results");

function makeResults(query){

    home.style.display = "none";
    resultsPage.style.display = "block";

    topSearchInput.value = query;

    resultsDiv.innerHTML = `
    
    <div class="result">
        <a href="#">${query} - Resultado principal</a>
        <div class="link">www.boxpixel.com/${query}</div>
        <p>
            Resultado de búsqueda relacionado con ${query}.
            Esta es una demo visual estilo Google creada para BoxPixel.
        </p>
    </div>

    <div class="result">
        <a href="#">Más información sobre ${query}</a>
        <div class="link">info.boxpixel.com</div>
        <p>
            Encuentra noticias, videos, imágenes y más contenido
            relacionado con ${query}.
        </p>
    </div>

    <div class="result">
        <a href="#">Comunidad BoxPixel</a>
        <div class="link">community.boxpixel.com</div>
        <p>
            Usuarios hablando sobre ${query} dentro de la comunidad.
        </p>
    </div>

    `;
}

searchForm.addEventListener("submit", function(e){

    e.preventDefault();

    const query = searchInput.value.trim();

    if(query !== ""){
        makeResults(query);
    }

});

topSearchForm.addEventListener("submit", function(e){

    e.preventDefault();

    const query = topSearchInput.value.trim();

    if(query !== ""){
        makeResults(query);
    }

});

</script>

</body>
</html>
