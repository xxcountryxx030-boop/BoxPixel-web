<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
}

header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    z-index:100;
    border-bottom:1px solid #222;
}

.logo{
    color:#ff2020;
    font-size:32px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 12px;
    transition:.3s;
}

nav a:hover{
    color:#ff2020;
}

.search{
    padding:10px;
    border:none;
    border-radius:20px;
    background:#1c1c1c;
    color:white;
}

.hero{
    margin-top:70px;
    height:80vh;
    background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600") center/cover;
    display:flex;
    align-items:center;
    padding-left:60px;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to right,#000 20%,transparent 80%);
}

.hero-content{
    position:relative;
    max-width:600px;
}

.hero h1{
    font-size:70px;
    margin-bottom:20px;
}

.hero p{
    font-size:18px;
    margin-bottom:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:10px;
}

.play{
    background:white;
    color:black;
}

.info{
    background:#333;
    color:white;
}

.section{
    padding:40px;
}

.section h2{
    margin-bottom:20px;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    border-radius:10px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>

<body>

<header>
    <div class="logo">🎬 Pixel Movies</div>

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Series</a>
        <a href="#">Películas</a>
        <a href="#">Mi Lista</a>
    </nav>

    <input class="search" type="text" placeholder="Buscar...">
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Pixel Movies</h1>
        <p>Disfruta de películas, series y contenido exclusivo en una experiencia moderna.</p>

        <button class="btn play">▶ Reproducir</button>
        <button class="btn info">ℹ Más información</button>
    </div>
</section>

<section class="section">
    <h2>🔥 Tendencias</h2>

    <div class="movies">

        <div class="card">
            <img src="https://picsum.photos/300/400?1">
            <h3>Película 1</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/400?2">
            <h3>Película 2</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/400?3">
            <h3>Película 3</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/400?4">
            <h3>Película 4</h3>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/400?5">
            <h3>Película 5</h3>
        </div>

    </div>
</section>

<footer>
    © 2026 Pixel Movies
</footer>

</body>
</html>
