<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Movies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    background:#111;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
}

.logo{
    color:#ff2222;
    font-size:32px;
    font-weight:bold;
}

#search{
    width:300px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#222;
    color:white;
}

.banner{
    height:70vh;
    background:linear-gradient(to right,#000,#00000060),
    url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    padding:60px;
}

.banner-content h1{
    font-size:70px;
}

.banner-content p{
    margin-top:10px;
    color:#ddd;
}

.movies{
    padding:30px;
}

.movies h2{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:330px;
    object-fit:cover;
}

.card h3{
    padding:15px;
    text-align:center;
}

.player{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

iframe{
    width:80%;
    height:70%;
}

.close{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
</style>
</head>
<body>

<header>
    <div class="logo">🎬 Pixel Movies</div>
    <input type="text" id="search" placeholder="Buscar película...">
</header>

<section class="banner">
    <div class="banner-content">
        <h1>Pixel Movies</h1>
        <p>Explora películas y mira sus tráilers oficiales.</p>
    </div>
</section>

<section class="movies">
    <h2>Películas Populares</h2>

    <div class="grid" id="movieGrid">

        <div class="card" data-video="TnGl01FkMMo">
            <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">
            <h3>Minecraft Movie</h3>
        </div>

        <div class="card" data-video="qSu6i2iFMO0">
            <img src="https://image.tmdb.org/t/p/w500/d8Ryb8AunYAuycVKDp5HpdWPKgC.jpg">
            <h3>Sonic 3</h3>
        </div>

        <div class="card" data-video="shW9i6k8cB0">
            <img src="https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg">
            <h3>Super Mario Bros</h3>
        </div>

        <div class="card" data-video="JfVOs4VSpmA">
            <img src="https://image.tmdb.org/t/p/w500/8VG8fDNiy50H4FedGwdSVUPoaJe.jpg">
            <h3>Spider-Verse</h3>
        </div>

    </div>
</section>

<div class="player" id="player">
    <iframe id="videoFrame"
        src=""
        frameborder="0"
        allowfullscreen>
    </iframe>

    <button class="close" onclick="closePlayer()">
        Cerrar
    </button>
</div>

<script>

const cards = document.querySelectorAll(".card");
const player = document.getElementById("player");
const frame = document.getElementById("videoFrame");

cards.forEach(card=>{

    card.addEventListener("click",()=>{

        const video = card.dataset.video;

        frame.src =
        `https://www.youtube.com/embed/${video}?autoplay=1`;

        player.style.display="flex";

    });

});

function closePlayer(){

    frame.src="";
    player.style.display="none";

}

document.getElementById("search")
.addEventListener("keyup",function(){

    let value = this.value.toLowerCase();

    document.querySelectorAll(".card")
    .forEach(card=>{

        const title =
        card.innerText.toLowerCase();

        card.style.display =
        title.includes(value)
        ? "block"
        : "none";

    });

});
</script>

</body>
</html>
