<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxPixel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#202124;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.logo{
    font-size:65px;
    font-weight:bold;
    margin-bottom:30px;
    letter-spacing:2px;
}

.logo span:nth-child(1){color:#4ea1ff;}
.logo span:nth-child(2){color:#ff5757;}
.logo span:nth-child(3){color:#ffd447;}
.logo span:nth-child(4){color:#4eff88;}
.logo span:nth-child(5){color:#4ea1ff;}
.logo span:nth-child(6){color:#ff7bf2;}
.logo span:nth-child(7){color:#ffffff;}
.logo span:nth-child(8){color:#aaaaaa;}

.search-container{
    width:90%;
    max-width:650px;
    position:relative;
}

.search-box{
    width:100%;
    background:#303134;
    border:1px solid #5f6368;
    border-radius:30px;
    padding:15px 20px;
    color:white;
    font-size:18px;
    outline:none;
    transition:0.2s;
}

.search-box:focus{
    border-color:#4ea1ff;
    box-shadow:0 0 10px rgba(78,161,255,0.4);
}

.suggestions{
    margin-top:10px;
    background:#303134;
    border-radius:20px;
    overflow:hidden;
    display:none;
    border:1px solid #5f6368;
}

.suggestion{
    padding:14px 20px;
    cursor:pointer;
    transition:0.2s;
    font-size:18px;
    border-bottom:1px solid #3c4043;
}

.suggestion:last-child{
    border-bottom:none;
}

.suggestion:hover{
    background:#3c4043;
}

.footer{
    position:absolute;
    bottom:20px;
    color:#9aa0a6;
    font-size:14px;
}
</style>
</head>

<body>

<div class="logo">
    <span>B</span>
    <span>o</span>
    <span>x</span>
    <span>P</span>
    <span>i</span>
    <span>x</span>
    <span>e</span>
    <span>l</span>
</div>

<div class="search-container">
    <input 
        type="text" 
        id="searchInput"
        class="search-box"
        placeholder="Buscar..."
        autocomplete="off"
    >

    <div class="suggestions" id="suggestions"></div>
</div>

<div class="footer">
    BoxPixel Browser
</div>

<script>
const searchInput = document.getElementById("searchInput");
const suggestionsBox = document.getElementById("suggestions");

const fakeResults = [
    "BoxPixel community",
    "BoxPixel games",
    "BoxPixel studios",
    "web browser",
    "weather",
    "web app",
    "music player",
    "minecraft",
    "python game",
    "chat online",
    "pixel art",
    "video editor",
    "BoxPixel engine",
    "dark mode",
    "javascript tutorial",
    "free assets"
];

searchInput.addEventListener("input", function(){

    const value = this.value.toLowerCase();

    suggestionsBox.innerHTML = "";

    if(value === ""){
        suggestionsBox.style.display = "none";
        return;
    }

    const filtered = fakeResults.filter(item =>
        item.toLowerCase().includes(value)
    );

    filtered.forEach(result => {

        const div = document.createElement("div");
        div.classList.add("suggestion");
        div.textContent = result;

        div.onclick = () => {
            searchInput.value = result;

            window.location.href =
                "https://www.google.com/search?q=" +
                encodeURIComponent(result);
        };

        suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display =
        filtered.length > 0 ? "block" : "none";
});

searchInput.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        const query = searchInput.value;

        if(query.trim() !== ""){
            window.location.href =
                "https://www.google.com/search?q=" +
                encodeURIComponent(query);
        }
    }
});
</script>

</body>
</html>
