<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Web Moderna</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
    }

    .nav-links a {
      margin-left: 20px;
      color: #cbd5e1;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: white;
    }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      height: 80vh;
      padding: 20px;
    }

    .hero h1 {
      font-size: 50px;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeIn 1s ease-in;
    }

    .hero p {
      margin-top: 15px;
      color: #cbd5e1;
      font-size: 18px;
      max-width: 500px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #2563eb;
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .hero h1 {
        font-size: 32px;
      }

      nav {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <div class="logo">⚡ MiWeb</div>
    <div class="nav-links">
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Tu Web Moderna 🚀</h1>
    <p>Diseño limpio, animaciones suaves y lista para proyectos reales.</p>
    <button class="btn" onclick="alert('¡Bienvenido Dylan! 😎')">
      Empezar
    </button>
  </section>

  <!-- CARDS -->
  <section class="cards">
    <div class="card">
      <h3>⚡ Rápida</h3>
      <p>Carga optimizada y diseño ligero.</p>
    </div>

    <div class="card">
      <h3>🎨 Moderna</h3>
      <p>Estilo actual tipo app profesional.</p>
    </div>

    <div class="card">
      <h3>📱 Responsive</h3>
      <p>Funciona en celular y PC.</p>
    </div>
  </section>

</body>
</html>
