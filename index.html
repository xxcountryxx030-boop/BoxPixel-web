<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>BoxPixel</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f1117;
        color:white;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    .bg{
        position:absolute;
        width:100%;
        height:100%;
        background:
        radial-gradient(circle at top left,#2563eb33,transparent 30%),
        radial-gradient(circle at bottom right,#7c3aed33,transparent 30%);
        z-index:-1;
    }

    .container{
        text-align:center;
        width:90%;
        max-width:800px;
    }

    .logo{
        font-size:80px;
        font-weight:bold;
        margin-bottom:30px;
        background:linear-gradient(90deg,#3b82f6,#8b5cf6);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        user-select:none;
    }

    .search-box{
        width:100%;
        background:#1e293b;
        border:2px solid transparent;
        border-radius:50px;
        display:flex;
        align-items:center;
        padding:10px 20px;
        transition:0.3s;
        box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    .search-box:hover{
        border-color:#3b82f6;
    }

    .search-box input{
        flex:1;
        background:none;
        border:none;
        outline:none;
        color:white;
        font-size:20px;
        padding:12px;
    }

    .search-box button{
        background:linear-gradient(90deg,#3b82f6,#8b5cf6);
        border:none;
        color:white;
        padding:12px 22px;
        border-radius:30px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;
        transition:0.3s;
    }

    .search-box button:hover{
        transform:scale(1.05);
    }

    .buttons{
        margin-top:25px;
    }

    .buttons button{
        margin:8px;
        padding:12px 20px;
        border:none;
        border-radius:12px;
        background:#1e293b;
        color:white;
        cursor:pointer;
        transition:0.3s;
        font-size:15px;
    }

    .buttons button:hover{
        background:#334155;
        transform:translateY(-2px);
    }

    .footer{
        position:absolute;
        bottom:20px;
        width:100%;
        text-align:center;
        color:#94a3b8;
        font-size:14px;
    }

</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

    <div class="logo">BoxPixel</div>

    <form id="searchForm">
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput"
                placeholder="Buscar en BoxPixel..."
                autocomplete="off"
            >

            <button type="submit">Buscar</button>
        </div>
    </form>

    <div class="buttons">
        <button onclick="quickSearch('Noticias')">📰 Noticias</button>
        <button onclick="quickSearch('Videos')">🎥 Videos</button>
        <button onclick="quickSearch('Juegos')">🎮 Juegos</button>
        <button onclick="quickSearch('Música')">🎵 Música</button>
    </div>

</div>

<div class="footer">
    BoxPixel Search © 2026
</div>

<script>

const form = document.getElementById("searchForm");
const input = document.getElementById("searchInput");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const query = input.value.trim();

    if(query !== ""){
        // Cambia Google por tu buscador después si quieres
        window.location.href = 
        "https://www.google.com/search?q=" + encodeURIComponent(query);
    }
});

function quickSearch(text){
    input.value = text;

    window.location.href = 
    "https://www.google.com/search?q=" + encodeURIComponent(text);
}

</script>

</body>
</html>
