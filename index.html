<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxPixelsWeb</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
    --bg:#050816;
    --card:#0f172a;
    --card2:#111827;
    --blue:#2563eb;
    --blue2:#60a5fa;
    --text:#ffffff;
    --muted:#94a3b8;
    --border:rgba(96,165,250,0.25);
    --shadow:0 0 30px rgba(37,99,235,0.25);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    font-family:'Inter',sans-serif;
}

/* ===== FONDO ===== */

.background{
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top,#2563eb 0%,#050816 55%),
    linear-gradient(to bottom,#050816,#02040d);

    z-index:-3;
}

.glow{
    position:fixed;

    width:500px;
    height:500px;

    background:rgba(37,99,235,0.18);

    filter:blur(120px);

    border-radius:50%;

    top:-100px;
    right:-120px;

    z-index:-2;
}

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

    background-size:40px 40px;

    z-index:-1;

    mask-image:linear-gradient(to bottom,rgba(0,0,0,1),rgba(0,0,0,0.3));
}

/* ===== NAVBAR ===== */

nav{
    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 28px;

    position:sticky;
    top:0;

    z-index:999;

    background:rgba(5,8,22,0.7);

    backdrop-filter:blur(14px);

    border-bottom:1px solid var(--border);
}

.logo{
    font-family:'Orbitron',sans-serif;

    font-size:28px;
    font-weight:700;

    color:var(--blue2);

    text-shadow:0 0 20px rgba(96,165,250,0.6);
}

.nav-right{
    display:flex;
    align-items:center;
    gap:18px;
}

.user-badge{
    padding:10px 16px;

    border-radius:14px;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    color:var(--muted);

    font-size:14px;
}

.menu-btn{
    width:50px;
    height:50px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,0.06);

    border:1px solid var(--border);

    cursor:pointer;

    transition:0.3s;
}

.menu-btn:hover{
    background:rgba(37,99,235,0.25);
    transform:scale(1.05);
}

/* ===== MENU ===== */

.side-menu{
    position:fixed;

    top:0;
    right:-340px;

    width:320px;
    height:100vh;

    background:rgba(10,15,30,0.95);

    backdrop-filter:blur(20px);

    border-left:1px solid var(--border);

    padding:30px;

    z-index:9999;

    transition:0.4s ease;

    display:flex;
    flex-direction:column;
    gap:18px;
}

.side-menu.active{
    right:0;
}

.close-btn{
    align-self:flex-end;

    font-size:30px;

    cursor:pointer;

    color:var(--muted);

    transition:0.3s;
}

.close-btn:hover{
    color:white;
    transform:rotate(90deg);
}

.side-title{
    font-family:'Orbitron',sans-serif;

    color:var(--blue2);

    margin-bottom:10px;
}

.side-menu a{
    text-decoration:none;

    color:white;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.05);

    padding:16px;

    border-radius:18px;

    transition:0.3s;

    font-weight:600;
}

.side-menu a:hover{
    background:rgba(37,99,235,0.25);
    transform:translateX(6px);
}

/* ===== HERO ===== */

.hero{
    min-height:90vh;

    display:flex;
    justify-content:center;
    align-items:center;

    flex-direction:column;

    text-align:center;

    padding:30px;

    position:relative;
}

.hero-box{
    max-width:950px;

    padding:50px;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    backdrop-filter:blur(18px);

    box-shadow:var(--shadow);
}

.hero h1{
    font-family:'Orbitron',sans-serif;

    font-size:78px;

    line-height:1.1;

    color:var(--blue2);

    text-shadow:0 0 25px rgba(96,165,250,0.45);
}

.hero p{
    margin-top:22px;

    color:#cbd5e1;

    font-size:18px;

    line-height:1.7;
}

.sub{
    margin-top:10px;

    color:var(--muted);

    font-size:14px;
}

/* ===== BOTONES ===== */

.buttons{
    margin-top:38px;

    display:flex;
    justify-content:center;
    gap:18px;

    flex-wrap:wrap;
}

.btn{
    padding:15px 28px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    color:white;

    background:linear-gradient(
        135deg,
        #2563eb,
        #3b82f6
    );

    font-weight:700;

    transition:0.3s;

    box-shadow:
    0 10px 25px rgba(37,99,235,0.3);
}

.btn:hover{
    transform:translateY(-3px) scale(1.03);

    box-shadow:
    0 15px 35px rgba(37,99,235,0.45);
}

/* ===== COMMUNITY ===== */

.section{
    padding:90px 20px;
}

.section-title{
    text-align:center;

    font-size:48px;

    font-family:'Orbitron',sans-serif;

    color:var(--blue2);

    margin-bottom:45px;
}

.chat-box{
    max-width:950px;

    margin:auto;

    background:rgba(255,255,255,0.05);

    border:1px solid var(--border);

    border-radius:28px;

    overflow:hidden;

    backdrop-filter:blur(18px);

    box-shadow:var(--shadow);
}

.chat-top{
    padding:20px 25px;

    border-bottom:1px solid rgba(255,255,255,0.06);

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.chat-top h3{
    color:var(--blue2);
}

.online{
    font-size:14px;
    color:#4ade80;
}

.messages{
    height:420px;

    overflow-y:auto;

    padding:24px;

    display:flex;
    flex-direction:column;
    gap:12px;
}

.messages::-webkit-scrollbar{
    width:6px;
}

.messages::-webkit-scrollbar-thumb{
    background:#2563eb;
    border-radius:20px;
}

.message{
    background:rgba(17,24,39,0.9);

    border:1px solid rgba(255,255,255,0.05);

    padding:14px 18px;

    border-radius:18px;

    animation:fadeIn 0.3s ease;
}

.message b{
    color:var(--blue2);
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.chat-input{
    display:flex;

    gap:12px;

    padding:20px;

    border-top:1px solid rgba(255,255,255,0.05);
}

.chat-input input{
    flex:1;

    background:#0b1120;

    border:1px solid rgba(255,255,255,0.06);

    border-radius:16px;

    padding:16px;

    color:white;

    outline:none;

    transition:0.3s;
}

.chat-input input:focus{
    border-color:#3b82f6;

    box-shadow:
    0 0 15px rgba(37,99,235,0.25);
}

.status{
    padding:18px;

    text-align:center;

    color:var(--blue2);

    border-top:1px solid rgba(255,255,255,0.05);
}

/* ===== FOOTER ===== */

footer{
    padding:35px;

    text-align:center;

    color:var(--muted);

    border-top:1px solid rgba(255,255,255,0.05);

    margin-top:50px;
}

/* ===== RESPONSIVE ===== */

@media(max-width:768px){

    .hero h1{
        font-size:48px;
    }

    .hero-box{
        padding:35px 20px;
    }

    .section-title{
        font-size:36px;
    }

    .chat-input{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

    .side-menu{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="background"></div>
<div class="glow"></div>
<div class="grid"></div>

<!-- MENU -->

<div class="side-menu" id="sideMenu">

    <div
    class="close-btn"
    onclick="closeMenu()">
    ✕
    </div>

    <h2 class="side-title">
        BoxPixelsWeb
    </h2>

    <a href="#"
    onclick="goHome()">
    🏠 Home
    </a>

    <a href="#"
    onclick="openCommunity()">
    💬 Comunidad
    </a>

</div>

<!-- NAVBAR -->

<nav>

    <div class="logo">
        BoxPixelsWeb
    </div>

    <div class="nav-right">

        <div
        class="user-badge"
        id="userBadge">
        🔒 Invitado
        </div>

        <div
        class="menu-btn"
        onclick="toggleMenu()">
        ☰
        </div>

    </div>

</nav>

<!-- HOME -->

<section
class="hero"
id="homeSection">

    <div class="hero-box">

        <h1>
            BoxPixelsWeb
        </h1>

        <p>
            Plataforma gamer futurista con chat en tiempo real,
            comunidad online y autenticación con Google.
        </p>

        <div class="sub">
            No official
        </div>

        <div class="buttons">

            <button
            class="btn"
            onclick="loginWithGoogle()">
            🚀 Iniciar con Google
            </button>

            <button
            class="btn"
            onclick="openCommunity()">
            💬 Comunidad
            </button>

        </div>

    </div>

</section>

<!-- COMUNIDAD -->

<section
class="section"
id="communitySection"
style="display:none;">

    <h2 class="section-title">
        Comunidad
    </h2>

    <div class="chat-box">

        <div class="chat-top">

            <h3>
                Chat Global
            </h3>

            <div class="online">
                ● Online
            </div>

        </div>

        <div
        class="messages"
        id="messages">
        </div>

        <div class="chat-input">

            <input
            type="text"
            id="messageInput"
            placeholder="Escribe un mensaje..."
            >

            <button
            class="btn"
            onclick="sendMessage()">
            Enviar
            </button>

        </div>

        <div
        class="status"
        id="status">
        🔒 Debes iniciar sesión
        </div>

    </div>

</section>

<footer>
BoxPixelsWeb © 2026
</footer>

<script>

/* ===== MENU ===== */

function toggleMenu(){

    document
    .getElementById("sideMenu")
    .classList.toggle("active");

}

function closeMenu(){

    document
    .getElementById("sideMenu")
    .classList.remove("active");

}

/* ===== PAGINAS ===== */

function goHome(){

    document
    .getElementById("homeSection")
    .style.display = "flex";

    document
    .getElementById("communitySection")
    .style.display = "none";

    closeMenu();

}

function openCommunity(){

    document
    .getElementById("homeSection")
    .style.display = "none";

    document
    .getElementById("communitySection")
    .style.display = "block";

    closeMenu();

}

/* ===== SUPABASE ===== */

const SUPABASE_URL =
"https://gwibpxgibmraqebetvss.supabase.co";

const SUPABASE_KEY =
"TU_SUPABASE_KEY";

const { createClient } = supabase;

const client =
createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* ===== USER ===== */

let currentUser = null;

/* ===== ELEMENTOS ===== */

const messagesDiv =
document.getElementById("messages");

const statusDiv =
document.getElementById("status");

const userBadge =
document.getElementById("userBadge");

/* ===== LOGIN ===== */

async function loginWithGoogle(){

    await client.auth.signInWithOAuth({

        provider:"google",

        options:{
            redirectTo:window.location.href
        }

    });

}

/* ===== SESION ===== */

async function startApp(){

    const {
        data:{ session }
    } = await client.auth.getSession();

    if(session){

        currentUser = session.user;

        statusDiv.innerHTML =
        "🟢 " + currentUser.email;

        userBadge.innerHTML =
        "🟢 " + currentUser.email;

    }

    loadMessages();

}

client.auth.onAuthStateChange((event, session) => {

    if(session){

        currentUser = session.user;

        statusDiv.innerHTML =
        "🟢 " + currentUser.email;

        userBadge.innerHTML =
        "🟢 " + currentUser.email;

    }else{

        currentUser = null;

        statusDiv.innerHTML =
        "🔒 Debes iniciar sesión";

        userBadge.innerHTML =
        "🔒 Invitado";

    }

});

/* ===== DUPLICADOS ===== */

const loadedMessages =
new Set();

/* ===== CREAR MENSAJE ===== */

function createMessage(id,user,text){

    if(loadedMessages.has(id)) return;

    loadedMessages.add(id);

    const div =
    document.createElement("div");

    div.className =
    "message";

    div.innerHTML =
    `<b>${user}:</b> ${text}`;

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop =
    messagesDiv.scrollHeight;

}

/* ===== CARGAR MENSAJES ===== */

async function loadMessages(){

    const { data,error } =
    await client
    .from("messages")
    .select("*")
    .order(
        "created_at",
        { ascending:true }
    );

    if(error){

        console.error(error);

        return;

    }

    data.forEach(msg => {

        createMessage(
            msg.id,
            msg.username,
            msg.text
        );

    });

}

/* ===== ENVIAR ===== */

async function sendMessage(){

    if(!currentUser){

        alert(
        "Debes iniciar sesión con Google"
        );

        return;

    }

    const input =
    document.getElementById(
        "messageInput"
    );

    const text =
    input.value.trim();

    if(text === "") return;

    const username =
    currentUser.user_metadata.full_name
    || currentUser.email;

    const { data,error } =
    await client
    .from("messages")
    .insert([
        {
            username: username,
            text: text
        }
    ])
    .select();

    if(error){

        console.error(error);

        statusDiv.innerHTML =
        "❌ Error enviando";

        return;

    }

    if(data){

        data.forEach(msg => {

            createMessage(
                msg.id,
                msg.username,
                msg.text
            );

        });

    }

    input.value = "";

}

/* ===== ENTER ===== */

document
.getElementById("messageInput")
.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            sendMessage();

        }

    }
);

/* ===== REALTIME ===== */

client
.channel("chat-room")

.on(
    "postgres_changes",
    {
        event:"INSERT",
        schema:"public",
        table:"messages"
    },

    payload => {

        createMessage(
            payload.new.id,
            payload.new.username,
            payload.new.text
        );

    }

)

.subscribe();

/* ===== START ===== */

startApp();

</script>

</body>
</html>
